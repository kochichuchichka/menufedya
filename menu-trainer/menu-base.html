<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База знаний: Меню</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f5f7fb; font-family: sans-serif; margin: 0; padding: 20px; }
        .kb-wrapper { max-width: 800px; margin: 0 auto; }
        
        .back-link { display: inline-block; padding: 12px 20px; background: #e5e5ea; border-radius: 12px; color: #1c1c1e; text-decoration: none; font-weight: 600; margin-bottom: 25px; }
        
        /* Панель навигации */
        .nav-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .nav-tabs button { padding: 10px 16px; background: #fff; border-radius: 10px; font-size: 15px; cursor: pointer; color: #007aff; border: 1px solid #d1d1d6; }
        #resetBtn { background: #1c1c1e; color: #fff; border: none; }

        /* Поиск */
        .search-box { width: 100%; padding: 20px; border: none; border-radius: 16px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-size: 18px; margin-bottom: 30px; box-sizing: border-box; }
        
        /* Блоки */
        .category-block { margin-bottom: 40px; }
        .category-block h2 { font-size: 24px; color: #3a3a3c; margin-bottom: 20px; border-left: 5px solid #007aff; padding-left: 15px; }
        
        .base-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 20px; display: flex; gap: 20px; align-items: center; box-shadow: 0 3px 10px rgba(0,0,0,0.04); }
        .base-card img { width: 120px; height: 120px; object-fit: cover; border-radius: 16px; flex-shrink: 0; }
        .card-info h3 { margin: 0 0 8px 0; font-size: 18px; color: #1c1c1e; }
        .card-info p { margin: 0; font-size: 15px; color: #636366; line-height: 1.5; }

        /* Кнопка наверх */
        #scrollTop { 
            position: fixed; bottom: 40px; right: 40px; 
            background: #fff; color: #000; border: 2px solid #000; 
            width: 50px; height: 50px; border-radius: 50%; 
            display: none; cursor: pointer; font-size: 24px; 
            align-items: center; justify-content: center; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="kb-wrapper">
    <a href="index.html" class="back-link">← На главную</a>
    <h1>База знаний</h1>

    <div class="nav-tabs" id="navTabs">
        <button id="resetBtn" onclick="filterByCategory('all')" style="display:none;">← Все блюда</button>
    </div>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Поиск по блюдам...">
    <div id="base-container"></div>
</div>

<button id="scrollTop">↑</button>

<script src="js/dishes.js"></script>
<script>
    const order = ["Завтраки", "Сморреброды и бутерброды", "Основное", "Закуски", "Салаты", "Щи/Борщи", "Лепим сами", "Десерты"];
    const container = document.getElementById('base-container');
    const navTabs = document.getElementById('navTabs');

    // Генерация кнопок
    order.forEach(cat => {
        navTabs.innerHTML += `<button onclick="filterByCategory('${cat}')">${cat}</button>`;
    });

    // Генерация карточек
    container.innerHTML = order.map(cat => `
        <div class="category-block" data-name="${cat}">
            <h2>${cat}</h2>
            ${originalDishes.filter(d => d.category.includes(cat)).map(d => `
                <div class="base-card">
                    <img src="${d.image}" onerror="this.src='img/placeholder.jpg'">
                    <div class="card-info">
                        <h3>${d.name}</h3>
                        <p><strong>Состав:</strong> ${d.composition}</p>
                    </div>
                </div>
            `).join('')}
        </div>
    `).join('');

    // Поиск
    document.getElementById('searchInput').addEventListener('keyup', function() {
        const term = this.value.toLowerCase();
        document.querySelectorAll('.base-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(term) ? 'flex' : 'none';
        });
    });

    // Фильтр категорий
    function filterByCategory(cat) {
        const blocks = document.querySelectorAll('.category-block');
        const resetBtn = document.getElementById('resetBtn');
        
        if (cat === 'all') {
            blocks.forEach(b => b.style.display = 'block');
            resetBtn.style.display = 'none';
        } else {
            blocks.forEach(b => b.style.display = (b.getAttribute('data-name') === cat) ? 'block' : 'none');
            resetBtn.style.display = 'inline-block';
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Быстрая кнопка скролла
    function smoothScrollToTop() {
        if (window.scrollY > 0) {
            window.scrollTo(0, window.scrollY - 100); 
            window.requestAnimationFrame(smoothScrollToTop);
        }
    }
    document.getElementById('scrollTop').onclick = smoothScrollToTop;

    window.onscroll = () => {
        document.getElementById('scrollTop').style.display = window.scrollY > 300 ? 'flex' : 'none';
    };
</script>
</body>
</html>
